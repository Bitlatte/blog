[[collection]]
type = "art"
title = "Algorithms to Live By: The Computer Science of Human Decisions"
subtitle = "Brian Christian and Tom Griffiths"
content = "All our lives are constrained by limited space and time, limits that give rise to a particular set of problems. What should we do, or leave undone, in a day or a lifetime? How much messiness should we accept? What balance of new activities and familiar favorites is the most fulfilling? These may seem like uniquely human quandaries, but they are not: computers, too, face the same constraints, so computer scientists have been grappling with their version of such issues for decades. And the solutions they've found have much to teach us."
link = "https://algorithmstoliveby.com/"
